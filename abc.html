<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Acronym Balderdash Challenge</title>
        <link rel="stylesheet" href="abc.css">
        <script src="rounds/data.js"></script> <!-- must be first -->
        <script src="rounds/safari.js"></script>
        <script src="rounds/stamp.js"></script>
        <script src="rounds/tiger.js"></script>
        <script src="rounds/bears.js"></script>
        <script src="rounds/zebra.js"></script>
        <script src="rounds/puma.js"></script>
        <script src="rounds/moose.js"></script>
        <script src="rounds/iguana.js"></script>
        <script src="rounds/llama.js"></script>
        <script src="rounds/lions.js"></script>
        <script src="rounds/frog.js"></script>
        <script src="rounds/chimp.js"></script>
        <script src="rounds/codex.js"></script>
        <script src="rounds/rebus.js"></script>
        <script src="rounds/morse.js"></script>
        <script src="rounds/score.js"></script>
        <script src="rounds/solve.js"></script>
        <script src="rounds/loser.js"></script>
        <script src="game.js" defer></script> <!-- must be last-->
    </head>
    <body>
        <main class="app">
            <div class="top-row">
                <div class="controls">
                    <button id="prevGuessBtn" type="button" title="(→) Show the previous guess">⏮️</button>
                    <button id="nextGuessBtn" type="button" title="(←) Show the next guess">⏩</button>
                    <button id="revealBtn" type="button" title="(R) Reveal the correct answer">🏅</button>
                    <button id="5050Btn" type="button" title="(F) Hide some wrong answers with a 50/50 hint">⚖️</button>
                    <button id="montyHallBtn" type="button" title="(M) Get a Monty Hall hint">🚪</button>
                </div>
                <div id="roundLabel">Round</div>
                <div class="controls">
                    <button id="prevRoundBtn" type="button" title="(↓) Go to the previous round">⬇️</button>
                    <button id="nextRoundBtn" type="button" title="(↑) Go to the next round">⬆️</button>
                </div>
            </div>

            <h1 id="acronymLabel" class="header-title">ACRONYM</h1>

            <section id="guessGrid" class="guess-grid" aria-live="polite"></section>

            <div id="statusLabel"></div>
        </main>
    </body>
</html>
